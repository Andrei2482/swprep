name = "swordigoplus-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "swordigoplus"
database_id   = "7b88bec5-a151-483e-8937-3aa5c750aa3f"

# ─── Native Rate Limiters ─────────────────────────────────────────────────────
[[unsafe.bindings]]
type         = "ratelimit"
name         = "LOGIN_LIMITER"
namespace_id = "1001"
simple       = { limit = 5, period = 60 }

[[unsafe.bindings]]
type         = "ratelimit"
name         = "REGISTER_LIMITER"
namespace_id = "1002"
simple       = { limit = 3, period = 60 }

[vars]
APP_NAME          = "SwordigoPlus"
# Comma-separated list of allowed CORS origins.
# Add new subdomains here as they come online.
CORS_ORIGINS      = "https://app.swordigoplus.cf,https://copilot.swordigoplus.cf"
# Cookie domain — leading dot = sent to ALL subdomains of swordigoplus.cf
COOKIE_DOMAIN     = ".swordigoplus.cf"
# Comma-separated whitelist of valid post-login redirect destinations.
# The frontend validates the ?redirect= param against this list to block open-redirect attacks.
REDIRECT_ORIGINS  = "https://copilot.swordigoplus.cf"
ACCESS_TOKEN_TTL  = "900"
REFRESH_TOKEN_TTL = "2592000"
PBKDF2_ITERATIONS = "100000"
