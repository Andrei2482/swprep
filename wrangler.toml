name = "swordigoplus-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Routes ───────────────────────────────────────────────────────────────────
# Uncomment and fill in once you have a custom domain connected in Cloudflare.
# [env.production]
# routes = [{ pattern = "api.swordigoplus.com/*", zone_name = "swordigoplus.com" }]

# ─── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"          # how the Worker accesses it: env.DB
database_name = "swordigoplus"
# ⚠️  REQUIRED: paste your D1 Database ID here (Cloudflare Dashboard → D1 → your database → copy the ID)
database_id   = "7b88bec5-a151-483e-8937-3aa5c750aa3f"

# ─── R2 Bucket (reserved for future use) ──────────────────────────────────────
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "swordigoplus-assets"

# ─── Secrets (set via Cloudflare Dashboard → Workers → Settings → Variables) ─
# JWT_SECRET          — a long random string (64+ chars) used to sign nothing
#                       here (we use opaque tokens), but kept for future use.
# COOKIE_SECRET       — used to sign the refresh-token cookie (optional)
# All other config is in wrangler.toml or environment variables below.

[vars]
# Public (non-secret) config — safe to commit.
APP_NAME          = "SwordigoPlus"
CORS_ORIGIN       = "*"                 # restrict to your frontend domain in prod
ACCESS_TOKEN_TTL  = "900"              # 15 minutes in seconds
REFRESH_TOKEN_TTL = "2592000"          # 30 days in seconds
RATE_LIMIT_LOGIN_MAX    = "5"
RATE_LIMIT_LOGIN_WINDOW = "900"        # 15 minute window (seconds)
RATE_LIMIT_REGISTER_MAX    = "3"
RATE_LIMIT_REGISTER_WINDOW = "3600"    # 1 hour window (seconds)
PBKDF2_ITERATIONS = "100000"
