name = "swordigoplus-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Routes ───────────────────────────────────────────────────────────────────
# Uncomment and fill in once you have a custom domain connected in Cloudflare.
# [env.production]
# routes = [{ pattern = "api.swordigoplus.com/*", zone_name = "swordigoplus.com" }]

# ─── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "swordigoplus"
database_id   = "7b88bec5-a151-483e-8937-3aa5c750aa3f"

# ─── Native Rate Limiters (Cloudflare Workers Rate Limiting API) ───────────────
# These use Cloudflare's built-in rate limiting — zero D1 queries, ultra-fast.
# namespace_id can be any unique integer you choose per limiter.
[[unsafe.bindings]]
type         = "ratelimit"
name         = "LOGIN_LIMITER"
namespace_id = "1001"
simple       = { limit = 5, period = 60 }   # 5 req / 60 sec per key

[[unsafe.bindings]]
type         = "ratelimit"
name         = "REGISTER_LIMITER"
namespace_id = "1002"
simple       = { limit = 3, period = 60 }   # 3 req / 60 sec per key

# ─── R2 Bucket (reserved for future use) ──────────────────────────────────────
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "swordigoplus-assets"

[vars]
APP_NAME          = "SwordigoPlus"
CORS_ORIGIN       = "*"
ACCESS_TOKEN_TTL  = "900"
REFRESH_TOKEN_TTL = "2592000"
PBKDF2_ITERATIONS = "100000"
